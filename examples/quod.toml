# ---------- json parser (self-hosting milestone) ----------
#
# The keystone for self-hosting: a JSON parser written in quod
# that can read `program.json`. v1 is C-style: fat-struct
# JsonValue, out-param + bool returns, arena-allocated.
#
# Each phase is preserved as its own program so the case study reads
# as a tour: `quod -p json_v1_phase0 show`, `... phase1 show`, etc.

[[program]]
name    = "json_v1_phase0"
version = "0.1.0"
file    = "json/phase0_skeleton/program.json"

  [[program.bin]]
  name  = "json_v1_phase0"
  entry = "main"

[[program]]
name    = "json_v1_phase1"
version = "0.1.0"
file    = "json/phase1_byte_primitives/program.json"

  [[program.bin]]
  name  = "json_v1_phase1"
  entry = "main"

[[program]]
name    = "json_v1_phase2"
version = "0.1.0"
file    = "json/phase2_keyword_parsers/program.json"

  [[program.bin]]
  name  = "json_v1_phase2"
  entry = "main"

[[program]]
name    = "json_v1_phase3"
version = "0.1.0"
file    = "json/phase3_parse_number/program.json"

  [[program.bin]]
  name  = "json_v1_phase3"
  entry = "main"

[[program]]
name    = "json_v1_phase4"
version = "0.1.0"
file    = "json/phase4_parse_string/program.json"

  [[program.bin]]
  name  = "json_v1_phase4"
  entry = "main"

[[program]]
name    = "json_v1_phase5"
version = "0.1.0"
file    = "json/phase5_parse_value/program.json"

  [[program.bin]]
  name  = "json_v1_phase5"
  entry = "main"

[[program]]
name    = "json_v1_phase6"
version = "0.1.0"
file    = "json/phase6_parse_array/program.json"

  [[program.bin]]
  name  = "json_v1_phase6"
  entry = "main"

[[program]]
name    = "json_v1_phase7"
version = "0.1.0"
file    = "json/phase7_parse_object/program.json"

  [[program.bin]]
  name  = "json_v1_phase7"
  entry = "main"

# ---------- json parser v2: rebuilt with sum types ----------
#
# Same v1 scope (null/bool/number/string/array/object). The shape change
# is the calling convention: parsers return JsonValue (enum) directly
# instead of (out-param i8*, bool ok). Errors travel as the JsonValue
# variant Error; wildcards make error-propagation a 2-arm match.

[[program]]
name    = "json_v2"
version = "0.1.0"
file    = "json_v2/program.json"

  [[program.bin]]
  name  = "json_v2"
  entry = "main"

# v3 builds on v2 — same enum + parsers — and adds the *consumer* side:
# accessors (get_field, get_index, as_number, ...), a top-level
# parse(text, len, arena) entry point, and a keystone test that parses
# one of quod's own program.json files.

[[program]]
name    = "json_v3"
version = "0.1.0"
file    = "json_v3/program.json"

  [[program.bin]]
  name  = "json_v3"
  entry = "main"

