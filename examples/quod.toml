# ---------- c_ingest ----------
#
# Each program.json was produced by `quod ingest <file>.c` against the
# .c source committed alongside it. Treat the .c file as the source of
# truth; to regenerate, delete program.json and re-run `quod ingest`
# from inside that directory.

[[program]]
